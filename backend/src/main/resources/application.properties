# ========================================
# MarketFlow - Configuration
# ========================================

spring.application.name=MarketFlow API

# --- Serveur ---
server.port=8080

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/marketflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Upload fichiers ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/products

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# --- Email (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=marketflow@gmail.com

# --- OTP ---
app.otp.expiration=300000
app.otp.length=6

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- CORS ---
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
