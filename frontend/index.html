<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketFlow — Précision Logistique & Commerce Global</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container flex justify-between items-center">
            <div class="flex items-center gap-lg">
                <a href="index.html" class="logo">MarketFlow</a>
                <nav class="flex gap-md">
                    <a href="index.html" class="nav-link active">Catalogue</a>
                    <a href="#" class="nav-link">Groupage</a>
                    <a href="dashboard.html" class="nav-link" id="nav-dashboard" style="display: none;">Dashboard</a>
                </nav>
            </div>
            <div class="flex items-center gap-md">
                <div class="search-bar" style="position: relative;">
                    <span class="material-symbols-outlined" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #727785; font-size: 20px;">search</span>
                    <input type="text" id="search-input" placeholder="Rechercher des produits..." style="padding: 10px 10px 10px 40px; border-radius: var(--radius-lg); border: 1px solid var(--outline-variant); background: var(--background); width: 250px;">
                </div>
                <button id="cart-btn" class="flex items-center" style="background: none; position: relative;">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--primary); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center;">0</span>
                </button>
                <div id="auth-links">
                    <a href="login.html" class="nav-link" style="color: var(--primary); font-weight: 600;">Connexion</a>
                </div>
                <div id="user-profile" style="display: none;">
                    <span class="material-symbols-outlined">account_circle</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: var(--space-xl);">
        <!-- Hero Section -->
        <section style="background: var(--primary-container); color: white; padding: var(--space-xl); border-radius: var(--radius-lg); margin-bottom: var(--space-xl); position: relative; overflow: hidden;">
            <div style="max-width: 600px; position: relative; z-index: 2;">
                <h1 style="font-size: 40px; margin-bottom: var(--space-md);">La logistique de précision rencontre le commerce mondial.</h1>
                <p style="opacity: 0.9; font-size: 18px; margin-bottom: var(--space-lg);">Sourcez auprès de distributeurs locaux ou profitez des réseaux de groupage avec un suivi en temps réel.</p>
                <div class="flex gap-md">
                    <input type="text" placeholder="Définir le lieu de livraison" style="flex: 1; padding: 15px; border-radius: var(--radius-md); border: none;">
                    <button style="background: white; color: var(--primary); padding: 0 var(--space-xl); border-radius: var(--radius-md); font-weight: 600;">Trouver du stock</button>
                </div>
            </div>
        </section>

        <div class="flex gap-lg">
            <!-- Sidebar Filtres -->
            <aside style="width: 250px; flex-shrink: 0;">
                <h3 style="margin-bottom: var(--space-md);">Modèle de sourcing</h3>
                <div class="flex flex-col gap-sm">
                    <label class="flex items-center gap-sm"><input type="checkbox" name="sourcing" value="LOCAL"> Inventaire local</label>
                    <label class="flex items-center gap-sm"><input type="checkbox" name="sourcing" value="GROUPAGE"> Groupage (Distant)</label>
                    <label class="flex items-center gap-sm"><input type="checkbox" name="sourcing" value="FACTORY_DIRECT"> Direct usine</label>
                </div>
            </aside>

            <!-- Grille Produits -->
            <section style="flex: 1;">
                <div class="flex justify-between items-center" style="margin-bottom: var(--space-md);">
                    <p id="results-count" style="color: var(--on-surface-variant); font-size: 14px;">Chargement des produits...</p>
                    <select id="sort-select" style="border: none; background: none; font-weight: 600;">
                        <option value="relevance">Pertinence</option>
                        <option value="price_asc">Prix croissant</option>
                        <option value="price_desc">Prix décroissant</option>
                    </select>
                </div>
                <div id="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: var(--space-lg);">
                    <!-- Les produits seront injectés ici -->
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="js/catalog.js"></script>
</body>
</html>
