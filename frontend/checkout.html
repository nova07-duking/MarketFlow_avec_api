<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser votre commande — MarketFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1fr 350px; gap: var(--space-xl); margin-top: var(--space-lg); }
        .form-group { margin-bottom: var(--space-md); }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--outline-variant); font-size: 14px; }
        .payment-method { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-md); }
        .payment-option { border: 1px solid var(--outline-variant); border-radius: var(--radius-md); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .payment-option.active { border-color: var(--primary); background: rgba(26, 115, 232, 0.05); }
    </style>
</head>
<body>
    <header class="header">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo">MarketFlow</a>
            <a href="index.html" class="nav-link">Retour au catalogue</a>
        </div>
    </header>

    <main class="container">
        <h1 style="font-size: 32px; margin-top: var(--space-xl);">Finaliser votre commande</h1>
        
        <div class="checkout-grid">
            <!-- Formulaire -->
            <section>
                <div style="background: white; border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); padding: var(--space-xl); margin-bottom: var(--space-lg);">
                    <h2 style="font-size: 20px; margin-bottom: var(--space-lg);">Informations de livraison</h2>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" name="fullName" required placeholder="Ex: Jean Dupont">
                        </div>
                        <div class="flex gap-md">
                            <div class="form-group" style="flex: 1;">
                                <label>Téléphone</label>
                                <input type="tel" name="phone" required placeholder="+33 6 12 34 56 78">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label>Code Postal</label>
                                <input type="text" name="zipCode" required placeholder="75001">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Adresse de livraison</label>
                            <input type="text" name="street" required placeholder="123 Rue de Rivoli">
                        </div>
                        <div class="form-group">
                            <label>Complément d'adresse (Optionnel)</label>
                            <input type="text" name="complement" placeholder="Appartement, Étage...">
                        </div>
                        <div class="flex gap-md">
                            <div class="form-group" style="flex: 1;">
                                <label>Ville</label>
                                <input type="text" name="city" required placeholder="Paris">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label>Pays</label>
                                <select name="country">
                                    <option value="France">France</option>
                                    <option value="Belgique">Belgique</option>
                                    <option value="Suisse">Suisse</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <div style="background: white; border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); padding: var(--space-xl);">
                    <h2 style="font-size: 20px; margin-bottom: var(--space-lg);">Mode de paiement</h2>
                    <div class="payment-method">
                        <div class="payment-option active" data-method="CARD">
                            <span class="material-symbols-outlined">credit_card</span>
                            <p style="font-size: 12px; margin-top: 8px;">Carte Bancaire</p>
                        </div>
                        <div class="payment-option" data-method="TRANSFER">
                            <span class="material-symbols-outlined">account_balance</span>
                            <p style="font-size: 12px; margin-top: 8px;">Virement</p>
                        </div>
                        <div class="payment-option" data-method="PAYPAL">
                            <span class="material-symbols-outlined">payments</span>
                            <p style="font-size: 12px; margin-top: 8px;">PayPal</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Récapitulatif -->
            <aside>
                <div style="background: white; border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); padding: var(--space-xl); position: sticky; top: 100px;">
                    <h2 style="font-size: 18px; margin-bottom: var(--space-lg);">Récapitulatif</h2>
                    <div id="cart-summary-items" style="margin-bottom: var(--space-lg);">
                        <!-- Items du panier -->
                    </div>
                    <div style="border-top: 1px dashed var(--outline-variant); padding-top: var(--space-md); margin-bottom: var(--space-lg);">
                        <div class="flex justify-between" style="font-size: 14px; color: var(--on-surface-variant); margin-bottom: 8px;">
                            <span>Sous-total</span>
                            <span id="summary-subtotal">0.00 €</span>
                        </div>
                        <div class="flex justify-between" style="font-size: 14px; color: var(--on-surface-variant); margin-bottom: 8px;">
                            <span>Livraison</span>
                            <span id="summary-shipping">Gratuit</span>
                        </div>
                        <div class="flex justify-between" style="font-size: 16px; font-weight: 700; margin-top: var(--space-md);">
                            <span>Total</span>
                            <span id="summary-total" style="color: var(--primary);">0.00 €</span>
                        </div>
                    </div>
                    <button id="place-order-btn" style="width: 100%; background: var(--primary); color: white; padding: 16px; border-radius: var(--radius-md); font-weight: 700; font-size: 16px;">
                        Payer maintenant
                    </button>
                    <p style="text-align: center; font-size: 12px; color: var(--on-surface-variant); margin-top: var(--space-md);">
                        <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">lock</span>
                        Paiement 100% sécurisé et crypté
                    </p>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="js/checkout.js"></script>
</body>
</html>
